name: Daily AI Knowledge Collect

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'deepseek' }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check quality
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            ARTICLE_COUNT=$(find knowledge/articles -name '*.json' | wc -l)
            DATE=$(date -u +%Y-%m-%d)
            echo "article_count=${ARTICLE_COUNT}" >> "$GITHUB_OUTPUT"
            echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "collect: ${ARTICLE_COUNT} articles on ${DATE}"
          git push
        env:
          ARTICLE_COUNT: ${{ steps.changes.outputs.article_count }}
          DATE: ${{ steps.changes.outputs.date }}
