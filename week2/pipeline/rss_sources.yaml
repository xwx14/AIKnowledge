# RSS数据源配置
# enabled: true 表示启用采集，false 表示禁用
# 量太大的源默认设为 enabled: false

sources:
  # 综合技术
  - name: "Hacker News Best"
    url: "https://hnrss.org/frontpage?q=AI+OR+ML+OR+artificial+intelligence"
    category: "综合技术"
    enabled: true

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ai.rss"
    category: "综合技术"
    enabled: true

  # AI 研究
  - name: "arXiv cs.AI"
    url: "http://export.arxiv.org/rss/cs.AI"
    category: "AI研究"
    enabled: false  # 量大，默认禁用

  # 公司博客
  - name: "OpenAI Blog"
    url: "https://openai.com/news/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/news/rss.xml"
    category: "公司博客"
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: "公司博客"
    enabled: true

  # 中文社区（默认禁用，需确认RSS可用性）
  - name: "机器之心"
    url: "https://www.jiqizhixin.com/rss"
    category: "中文社区"
    enabled: false

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: "中文社区"
    enabled: false

  # 额外技术源
  - name: "GitHub Blog AI"
    url: "https://github.blog/ai-and-ml/rss/"
    category: "综合技术"
    enabled: true
