# ai-knowledge-base 定时任务
# 使用方式: crontab crontab.conf 或 crontab -e 后粘贴以下内容

# 每天早上 8:00 — 仅采集（不调 LLM）
0 8 * * * cd ~/ai-knowledge-base && python pipeline/pipeline.py --sources github,rss --limit 20 >> logs/collect.log 2>&1

# 每周日上午 10:00 — 采集 + LLM 分析入库
0 10 * * 0 cd ~/ai-knowledge-base && python pipeline/pipeline.py --sources github,rss --limit 20 --analyze >> logs/analyze.log 2>&1
